name: PR Checks

on:
    pull_request:
        types: [opened, synchronize, reopened]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.10
            - run: bun install --frozen-lockfile
            - run: bun lint

    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.10
            - run: bun install --frozen-lockfile
            - run: bun run format:check
