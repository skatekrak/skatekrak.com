name: Deploy

on:
    push:
        branches: [main]
    workflow_dispatch:

env:
    NEXT_PUBLIC_BUGSNAG_KEY: ${{ secrets.NEXT_PUBLIC_BUGSNAG_KEY }}

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v1
              with:
                  bun-version: 1.3.10
            - run: bun install --frozen-lockfile
            - run: bun lint
