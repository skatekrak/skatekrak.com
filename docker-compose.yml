services:
    web:
        image: oven/bun:1.3.10
        command: bash -c "bun install && bun dev:web"
        labels:
            - traefik.enable=true
            - traefik.http.routers.skatekrak.entrypoints=http,https
            - traefik.http.routers.skatekrak.rule=Host(`dev.skatekrak.com`) # You can use any domain allowed by your TLS certificate
            - traefik.http.routers.skatekrak.tls=true
            - traefik.http.routers.skatekrak.service=skatekrak
            - traefik.http.services.skatekrak.loadbalancer.server.port=3000 # Adapt to the exposed port in the service

        # - traefik.http.routers.skatekrak.middlewares=carrelage-redir
        # - traefik.http.middlewares.carrelage-redir.redirectregex.regex=ˆhttps://api.dev.skatekrak.com/(.*)
        # - traefik.http.middlewares.carrelage-redir.redirectregex.replacement=http://carrelage-carrelage-1:3636/$$1
        working_dir: /app
        depends_on:
            - api
        volumes:
            - .:/app
            - ~/.npmrc:/app/.npmrc:ro
            - skatekrak-next:/app/.next
            - skatekrak-web-node_modules:/app/node_modules
        env_file: apps/web/.env

    manager:
        image: oven/bun:1.3.10
        command: bash -c "bun install && bun dev:manager"
        labels:
            - traefik.enable=true
            - traefik.http.routers.krak-manager.entrypoints=http,https
            - traefik.http.routers.krak-manager.rule=Host(`manager.dev.skatekrak.com`) # You can use any domain allowed by your TLS certificate
            - traefik.http.routers.krak-manager.tls=true
            - traefik.http.routers.krak-manager.service=krak-manager
            - traefik.http.services.krak-manager.loadbalancer.server.port=3000 # Adapt to the exposed port in the service
        working_dir: /app
        depends_on:
            - api
        volumes:
            - .:/app
            - ~/.npmrc:/app/.npmrc:ro
            - krak-manager-next:/app/.next
            - krak-manager-node_modules:/app/node_modules
        env_file: apps/manager/.env

    api:
        image: oven/bun:1.3.10
        command: bash -c "bun install && bun dev:api:docker"
        labels:
            - traefik.enable=true
            - traefik.http.routers.krak-api.entrypoints=http,https
            - traefik.http.routers.krak-api.rule=Host(`api.dev.skatekrak.com`) # You can use any domain allowed by your TLS certificate
            - traefik.http.routers.krak-api.tls=true
            - traefik.http.routers.krak-api.service=krak-api
            - traefik.http.services.krak-api.loadbalancer.server.port=3000 # Adapt to the exposed port in the service
        working_dir: /app
        depends_on:
            - postgres
        volumes:
            - .:/app
            - ~/.npmrc:/app/.npmrc:ro
            - skatekrak-api-node_modules:/app/node_modules

    postgres:
        image: postgres:17
        environment:
            POSTGRES_USER: krak
            POSTGRES_PASSWORD: krak
            POSTGRES_DB: krak
        volumes:
            - postgres-data:/var/lib/postgresql/data
        ports:
            - 5433:5432

    meilisearch:
        image: getmeili/meilisearch:v1.13
        environment:
            MEILI_MASTER_KEY: masterKey
            MEILI_ENV: development
        volumes:
            - meilisearch-data:/meili_data
        ports:
            - 7700:7700

volumes:
    skatekrak-next: null
    skatekrak-web-node_modules: null
    krak-manager-next: null
    krak-manager-node_modules: null
    skatekrak-api-node_modules: null
    carrelage-build: null
    carrelage-node_modules: null
    postgres-data: null
    meilisearch-data: null

networks:
    default:
        name: docker
        external: true
